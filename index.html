
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Digitech University</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f6f9;
      color: #333;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      background-color: #0d47a1;
      color: white;
      padding: 15px 20px;
    }
    .header-container {
      display: flex;
      align-items: center;
    }
    .header-container img {
      height: 60px;
      margin-right: 15px;
    }
    .site-info h1 {
      font-size: 1.6rem;
      margin-bottom: 3px;
    }
    .site-info p {
      font-style: italic;
      font-size: 0.95rem;
      margin: 0;
    }
    nav {
      background-color: #1565c0;
      padding: 12px 20px;
    }
    nav a {
      color: white;
      text-decoration: none;
      margin-right: 20px;
      font-weight: 500;
    }
    nav a:hover {
      text-decoration: underline;
    }
    main {
      padding: 25px 20px;
      flex: 1;
    }
    footer {
      background-color: #0d47a1;
      color: white;
      text-align: center;
      padding: 15px 20px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-container">
      <img src="logo.png" alt="Logo Digitech University">
      <div class="site-info">
        <h1>Digitech University</h1>
        <p>Gerbang Peradaban Digital</p>
      </div>
    </div>
  </header>
  <nav>
    <a href="#">Beranda</a>
    <a href="#">Program Studi</a>
    <a href="#">Berita</a>
    <a href="#">Kontak</a>
  </nav>
  <main>
    <h2>Selamat Datang di Digitech University</h2>
    <p>Kampus modern dengan semangat inovasi dan teknologi digital masa depan.</p>
  </main>
  <footer>
    &copy; 2025 Digitech University. Hak cipta dilindungi.
  </footer>
</body>
</html>
