<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Universitas Teknologi Digital</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f9;
      color: #333;
    }
    header {
      background-color: #0d47a1;
      padding: 10px 20px;
      color: white;
    }
    .logo-container {
      display: flex;
      align-items: center;
    }
    .logo {
      height: 60px;
      margin-right: 15px;
    }
    .site-title {
      font-size: 1.8rem;
      font-weight: bold;
    }
    nav {
      background-color: #1565c0;
      padding: 10px 20px;
    }
    nav a {
      color: white;
      text-decoration: none;
      margin-right: 20px;
      font-weight: bold;
    }
    main {
      padding: 20px;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo-container">
      <img src="logo.png" alt="Logo Kampus" class="logo" />
      <h1 class="site-title">Universitas Teknologi Digital</h1>
    </div>
  </header>
  <nav>
    <a href="#">Beranda</a>
    <a href="#">Tentang</a>
    <a href="#">Program Studi</a>
    <a href="#">Berita</a>
    <a href="#">Kontak</a>
  </nav>
  <main>
    <h2>Selamat Datang di Universitas Teknologi Digital</h2>
    <p>Website resmi kampus modern berbasis teknologi dan inovasi.</p>
  </main>
</body>
</html>
