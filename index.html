<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DIGITECH UNIVERSITY</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f8ff;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #007acc;
      color: white;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    header img {
      height: 80px;
    }

    header h1 {
      margin: 0;
      font-size: 1.5em;
    }

    nav {
      background-color: #e0e0e0;
      padding: 10px;
      text-align: center;
      min-height: 0px;
    }

    main {
      padding: 20px;
      min-height: 300px;
    }

    .galeri {
      text-align: center;
    }

    .kotak-foto {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }

    .foto {
      width: 300px;
      height: 300px;
      background-color: #ddd;
      border: 2px solid #ccc;
      border-radius: 10px;
      background-size: cover;
      background-position: center;
    }

    footer {
      background-color: #007acc;
      color: white;
      text-align: center;
      padding: 15px;
      position: fixed;
      width: 100%;
      bottom: 0;
    }
  </style>
</head>
<body>
  <header>
    <img src="Logo.png" alt="Logo Digitech University" />
    <h1>DIGITECH UNIVERSITY - <em>"Gerbang Peradaban Digital"</em></h1>
  </header>

  <nav>
    <!-- Menu kosong -->
  </nav>

  <main>
    <section class="galeri">
      <div class="kotak-foto">
        <div class="foto" style="background-image: url('01.jpg');"></div>
        <div class="foto" style="background-image: url('02.jpg');"></div>
        <div class="foto" style="background-image: url('03.jpg');"></div>
        <div class="foto" style="background-image: url('04.jpg');"></div>
      </div>
    </section>
  </main>

  <footer>
    &copy; 2025
  </footer>
</body>
</html>
